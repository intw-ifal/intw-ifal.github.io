<html>
<head>
  <title>Site do projeto da disciplina INTW.</title>
  <link rel="stylesheet" href="estilo.css">
  <script src="script.js"></script>
</head>
<body bgcolor="green">
  <center>
  <h1>
  Site para o desenvolvimento da disciplina de INTW...
  </h1>
  Página com conteúdo em Html, CSS e Javascript...
  <br>
  <a href="http://ifal.edu.br" target="_blank">Site do Instituto Federal de Alagoas - IFAL</a>
  <br>
  <table border="1">
  <tr>
    <th>Month</th>
    <th>Savings</th>
  </tr>
  <tr>
    <td>January</td>
    <td>$1000</td>
  </tr>
  <tr>
    <td>February</td>
    <td>$800</td>
  </tr>
  <tr>
    <td>March</td>
    <td>$1800</td>
  </tr>

</table>
   
<form>
  <label for="nome">Nome:</label><br>
  <input type="text" id="nome" name="nome"><br>
  <input type="radio" id="html" name="fav_language" value="HTML">
  <label for="html">HTML</label><br>
  <input type="radio" id="css" name="fav_language" value="CSS">
  <label for="css">CSS</label><br>
  <input type="radio" id="javascript" name="fav_language" value="JavaScript">
  <label for="javascript">JavaScript</label>
  <label for="periodo">Selecione o período atual: </label>
  <select id="periodo" name="periodo">
    <option value="1">1º Período:</option>
    <option value="2">2º Período:</option>
    <option value="3">3º Período:</option>
    <option value="4">4º Período:</option>
  </select>
  <button type="button" onclick="alert(document.getElementById('nome').value+' '+document.getElementById('fav_language')+' '+document.getElementById('periodo').value)">Verificar</button>
</form>

</center>
</body>
</html>
